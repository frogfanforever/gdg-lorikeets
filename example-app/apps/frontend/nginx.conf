# Serves the Angular SPA and reverse-proxies /api to the backend Cloud Run
# service, so the browser only ever talks to one origin (no CORS).
# ${PORT} and ${BACKEND_URL} are substituted from the environment at startup.
server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service. proxy_pass has no URI part, so the
    # full original request path (/api/...) is forwarded unchanged. Host defaults
    # to the backend host from BACKEND_URL — required for Cloud Run routing.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
