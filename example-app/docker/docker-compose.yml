services:
  db:
    image: postgres:16-alpine
    container_name: example-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: example
    ports:
      - '5432:5432'
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - example-app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d example']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  example-app-db-data:
