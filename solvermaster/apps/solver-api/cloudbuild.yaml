# Build → push → deploy the NestJS solver-api to Cloud Run. Used for manual deploys
# and by GitHub Actions on every push. Submit from solvermaster/ root:
#   gcloud builds submit --config apps/solver-api/cloudbuild.yaml --substitutions=_TAG=<sha> .
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', '-f', 'apps/solver-api/Dockerfile',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-api:${_TAG}',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-api:latest',
      '.'
    ]
    env: ['DOCKER_BUILDKIT=1']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-api']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', '${_SERVICE}',
      '--image', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-api:${_TAG}',
      '--region', '${_REGION}', '--platform', 'managed',
      '--allow-unauthenticated', '--port', '8080',
      '--min-instances', '0', '--max-instances', '3',
      '--set-env-vars', 'TRIZ_SERVICE_URL=${_TRIZ_SERVICE_URL}'
    ]

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-api:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-api:latest'

substitutions:
  _REGION: 'europe-west1'
  _REPO: 'solvermaster-repo'
  _SERVICE: 'solver-api'
  _TRIZ_SERVICE_URL: 'https://solver-be-66obdg3tha-ew.a.run.app'
  _TAG: 'manual'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
