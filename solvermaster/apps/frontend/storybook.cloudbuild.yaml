# Build → push → deploy Storybook to Cloud Run (separate service). Submit from solvermaster/:
#   gcloud builds submit --config apps/frontend/storybook.cloudbuild.yaml --substitutions=_TAG=<sha> .
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'apps/frontend/storybook.Dockerfile',
           '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/storybook:${_TAG}',
           '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/storybook:latest', '.']
    env: ['DOCKER_BUILDKIT=1']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/storybook']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', '${_SERVICE}',
           '--image', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/storybook:${_TAG}',
           '--region', '${_REGION}', '--platform', 'managed', '--allow-unauthenticated',
           '--port', '8080', '--min-instances', '0', '--max-instances', '2']
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/storybook:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/storybook:latest'
substitutions:
  _REGION: 'europe-west1'
  _REPO: 'solvermaster-repo'
  _SERVICE: 'storybook'
  _TAG: 'manual'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
