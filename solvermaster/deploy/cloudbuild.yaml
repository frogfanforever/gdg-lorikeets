# Cloud Build: build + push the API and frontend images to Artifact Registry.
# Submit from the example-app/ root:
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions=_REGION=europe-west1,_PROJECT_ID=<id>,_REPO=example-app-repo
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', '-f', 'apps/api/Dockerfile',
      '-t', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/example-api:latest',
      '.'
    ]
    env: ['DOCKER_BUILDKIT=1']
    id: 'build-api'

  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', '-f', 'apps/frontend/Dockerfile',
      '-t', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/example-frontend:latest',
      '.'
    ]
    env: ['DOCKER_BUILDKIT=1']
    id: 'build-frontend'

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/example-api:latest'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/example-frontend:latest'

substitutions:
  _REGION: 'europe-west1'
  _PROJECT_ID: ''
  _REPO: 'example-app-repo'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
