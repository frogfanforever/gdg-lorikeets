# Build → push → deploy the solver BE to Cloud Run. Used both for manual deploys and
# by CI (GitHub Actions calls `gcloud builds submit --config` on every push to main).
# Image is tagged with the commit SHA (_TAG) so each commit publishes a new version.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', '-f', 'ai/solver/service/Dockerfile',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-be:${_TAG}',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-be:latest',
      '.'
    ]
    env: ['DOCKER_BUILDKIT=1']
    id: build

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-be']
    id: push

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', '${_SERVICE}',
      '--image', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-be:${_TAG}',
      '--region', '${_REGION}', '--platform', 'managed',
      '--allow-unauthenticated', '--port', '8080',
      '--set-env-vars', 'HOST=0.0.0.0',
      '--min-instances', '0', '--max-instances', '3'
    ]
    id: deploy

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-be:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/solver-be:latest'

substitutions:
  _REGION: 'europe-west1'
  _REPO: 'solver-be-repo'
  _SERVICE: 'solver-be'
  _TAG: 'manual'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
