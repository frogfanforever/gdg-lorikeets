# Build → push → deploy the vendored TRIZ MCP server to Cloud Run.
# Submit from mcp-server/:  gcloud builds submit --config cloudbuild.yaml --substitutions=_TAG=<sha> .
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/triz-mcp-server:${_TAG}',
           '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/triz-mcp-server:latest', '.']
    env: ['DOCKER_BUILDKIT=1']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/triz-mcp-server']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', '${_SERVICE}',
           '--image', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/triz-mcp-server:${_TAG}',
           '--region', '${_REGION}', '--platform', 'managed', '--allow-unauthenticated',
           '--port', '8080', '--memory', '1Gi', '--min-instances', '0', '--max-instances', '2',
           '--set-env-vars', 'MCP_HOST=0.0.0.0,MCP_PORT=8080']
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/triz-mcp-server:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/triz-mcp-server:latest'
substitutions:
  _REGION: 'europe-west1'
  _REPO: 'solvermaster-repo'
  _SERVICE: 'triz-mcp-server'
  _TAG: 'manual'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
